{{ define "main" }}
<article style="max-width: 800px; margin: 0 auto; padding: 40px 20px;">
  <div style="width: 100%; height: 400px; background: #eee; border-radius: 12px; margin-bottom: 30px; display: flex; align-items: center; justify-content: center;">
    <span style="color: #999;">[ Hero Image ]</span>
  </div>
  
  <h1>{{ .Title }}</h1>
  
  <div style="display: flex; gap: 20px; color: #666; margin-bottom: 30px; border-bottom: 1px solid #eee; padding-bottom: 10px;">
    <span>{{ i18n "prep" }}: {{ .Params.prep }}</span>
    <span>{{ i18n "cook" }}: {{ .Params.cook }}</span>
  </div>

  <div class="recipe-content">
    {{ .Content }}
  </div>
</article>
{{ end }}
