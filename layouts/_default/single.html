{{ define "main" }}
<article class="recipe-article" style="padding: 80px 0; max-width: 800px; margin: 0 auto;">
    <div class="container">
        <header class="recipe-header" style="text-align: center; margin-bottom: 40px;">
            <h1 style="font-size: 3rem; color: #333;">{{ .Title }}</h1>
            <div class="meta" style="color: #999;">
                <span>发布日期: {{ .Date.Format "2006-01-02" }}</span>
                {{ with .Params.tags }}
                <span style="margin-left: 20px;">标签: {{ range . }}#{{ . }} {{ end }}</span>
                {{ end }}
            </div>
        </header>

        <div class="recipe-content" style="line-height: 1.8; font-size: 1.1rem;">
            {{ .Content }}
        </div>

        <hr style="margin: 50px 0;">
        
        <div style="text-align: center;">
            <a href="/recipes/" style="color: #ef4444; text-decoration: none; font-weight: bold;">
                ← 返回菜谱列表
            </a>
        </div>
    </div>
</article>
{{ end }}
