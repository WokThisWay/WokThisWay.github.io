{{ define "main" }}
<section style="padding: 120px 5% 60px; text-align: center; background: #F9F9F7;">
    <h1 style="font-size: 3rem; font-weight: 900; text-transform: uppercase; letter-spacing: 4px;">
        Category: {{ .Title }}
    </h1>
    <p style="color: #86868B;">Found {{ .Paginator.TotalPages }} recipes in this section</p>
    <a href="/" style="text-decoration: none; color: #89b449; font-size: 0.9rem;">← Back to Home</a>
</section>

<section class="menu-container">
    <div class="recipe-grid">
        {{ range .Pages }}
        <div class="recipe-card">
            <a href="{{ .Permalink }}" style="text-decoration: none; color: inherit;">
                <div class="card-image"><span>[ IMAGE ]</span></div>
                <div class="card-info">
                    <h3>{{ .Title }}</h3>
                    <p>{{ .Params.prep }} / {{ .Params.cook }}</p>
                </div>
            </a>
        </div>
        {{ end }}
    </div>
</section>
{{ end }}
